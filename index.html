<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Op-Amp Analizi - Omer 4132</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Op-Amp Devre Analizi ve Karşılaştırma</h1>
        <p>Teknik Karşılaştırma Portalı - SUBÜ Arifiye MYO</p>
    </header>

    <main>
        <section class="comparison-section">
            <div class="grid-container">
                <div class="card">
                    <h3>Op-Amp İçeren Devre</h3>
                    <img src="opampli.jpeg" alt="Op-Amp Devresi" style="width:100%; border-radius:8px;">
                </div>
                <div class="card">
                    <h3>Op-Amp İçermeyen Devre</h3>
                    <img src="opampsiz.jpeg" alt="Pasif Devre" style="width:100%; border-radius:8px;">
                </div>
            </div>
        </section>

        <section class="video-section">
            <h2>Video Analizleri</h2>
            <div class="video-grid">
                <div class="video-card">
                    <h3>Op-Amp'lı Çalışma</h3>
                    <video controls width="100%">
                        <source src="opamplivideo.mp4" type="video/mp4">
                    </video>
                </div>
                <div class="video-card">
                    <h3>Op-Amp'sız Çalışma</h3>
                    <video controls width="100%">
                        <source src="opampsizvideo.mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>Hazırlayan: Omer 4132</p>
    </footer>
</body>
</html>
